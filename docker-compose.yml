version: "3.8"

services:
  teleclaw:
    build: .
    container_name: teleclaw
    restart: unless-stopped
    volumes:
      # 설정 파일 (필수)
      - ./config.yaml:/app/config.yaml:ro
      # 데이터 (SQLite DB, flag 파일)
      - teleclaw-data:/app/data
      # 로그
      - teleclaw-logs:/app/logs
      # Claude Code 인증 정보
      - ~/.claude:/root/.claude
      # 프로젝트 디렉토리 (각 프로젝트 CWD를 마운트)
      # config.yaml의 cwd 경로와 일치시키세요
      # - /path/to/your/project:/workspace/project
    environment:
      - PYTHONUNBUFFERED=1
      # Claude Code 인증 (선택: 환경변수로 전달)
      # - ANTHROPIC_API_KEY=sk-...

volumes:
  teleclaw-data:
  teleclaw-logs:
