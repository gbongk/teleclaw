# TeleClaw 설정 파일
# 이 파일을 config.yaml로 복사한 후 실제 값을 채우세요.
#   cp config.example.yaml config.yaml

# 언어 (ko / en)
lang: "en"

# 텔레그램 채팅 ID (봇과 대화할 사용자)
chat_id: "YOUR_TELEGRAM_CHAT_ID"

# 허용된 사용자 ID (쉼표 구분, 비워두면 chat_id만 허용)
# @userinfobot 으로 자신의 ID를 확인할 수 있습니다
allowed_users: ""

# 출력 레벨 (minimal / normal / verbose)
output_level: "normal"

# 결과 풀텍스트 표시 도구 (fnmatch 패턴: * ? [])
# 매칭되는 도구의 결과를 텔레그램에 전문 표시. 나머지는 길이만.
verbose_tools:
  - "mcp__ai*chat__*"    # ai-chat 도구
  # - "mcp__emulator__*" # 에뮬레이터 도구
  # - "mcp__*"           # 모든 MCP 도구
  # - "*"                # 모든 도구

# 프로젝트별 설정
# 각 프로젝트는 독립된 텔레그램 봇으로 운영됩니다.
# @BotFather에서 봇을 생성하고 토큰을 입력하세요.
projects:
  MyProject:
    cwd: "/path/to/your/project"          # Claude Code 작업 디렉토리
    bot_token: "BOT_TOKEN_FROM_BOTFATHER"  # 텔레그램 봇 토큰 (@BotFather에서 발급)
